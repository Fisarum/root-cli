name: Bug report
description: Report a problem with Root
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: |
        Root generated a command that did not match my request.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `root --version` to find your version.
      placeholder: 0.1.0
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the exact steps to reproduce the behavior.
      placeholder: |
        1. Run `root ...`
        2. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include full error messages if any.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, backend, or configuration details.
