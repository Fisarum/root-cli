name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Root
        run: pip install -e .

      - name: Check CLI loads
        run: root --help

      - name: Check package imports
        run: python -c "import root.cli; import root.translate; import root.memory; import root.risk"
